<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity4">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Task</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../static/css/main.css" th:href="@{/css/main.css}" rel="stylesheet">
    <style>
      .container {
        max-width: 900px;
      }

      .form-select {
        margin-top: 8px;
      }

    </style>

</head>
<body class="d-flex flex-column min-vh-100">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark" aria-label="Second navar example">
  <div class="container-fluid">
    <h1 class="d-flex align-items-center fs-4 text-white mb-0">
      <img src="../static/img/logo.svg" th:src="@{/img/logo.svg}"
           width="38" height="30" class="me-3" alt="Bootstrap">
      TaskHive
    </h1>
    <div class="collapse navbar-collapse navbar-options">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" href="#" th:href="@{/}">Home</a>
        </li>
        <li class="nav-item" sec:authorize="isAuthenticated()">
          <a class="nav-link" href="#" aria-current="page" th:href="@{/task}">Task</a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('ROLE_ADMIN')">
          <a class="nav-link" href="#" th:href="@{/admin/}">Admin</a>
        </li>
      </ul>
      <ul class="navbar-nav ms-auto">
        <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
          <th:block th:with="auth=${#authentication.getPrincipal()}">
            <a class="nav-link dropdown-toggle" href="#" id="dropdown03" role="button" data-bs-toggle="dropdown"></a>
          </th:block>
          <ul class="dropdown-menu dropdown-menu end" aria-labelledby="dropdown03">
            <li>
              <form style="..." th:action="@{/logout}" method="post" id="logoutForm"></form>
              <a class="dropdown-item" href="javascript:document.getElementById(logoutForm)" >Logout</a>
            </li>
          </ul>
        </li>
        <li class="nav-item" sec:authorize="!isAuthenticated()">
          <a class="nav-link" href="#" th:href="@{/login}">Login</a>
        </li>
      </ul>
    </div>
  </div>
</nav>
<main>
  <div class="container py-5 h-100">
    <div class="row d-flex justify-content-center align-items-center h-100">
      <div class="col">
        <div class="card rounder-3">
          <div class="card-body p-4">

           <form class="row row-cols-auto g-3 justify-content-center align-items-center"
                  action="#" th:action="@{/task/submit}" method="POST" th:object="${newTask}" sec:authorize="hasRole('ROLE_USER')">
              <h3>Create new task</h3>
              <div class="col-12">
                <div class="form-outline">
                  <label class="form-label" for="task-title">Task title</label>
                  <div class="input-group has-validation">
                    <input type="text" class="form-control" id="task-title"
                            th:classappend="${#fields.hasErrors('title')}? 'is-invalid'"
                            th:field="*{title}" aria-describedby="task-titleHelp" required>
                    <div id="validation-title" class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>

                  </div>
                </div>
              </div>
              <div class="col-12">
                <div class="form-outline">
                  <label class="form-label" for="task-desc">Description</label>
                  <textarea class="form-control" id="task-desc" rows="3"placeholder="Optional..." th:field="*{description}"></textarea>
                </div>
              </div>
              <div class="col-12">
                <label for="category">Category</label>
                <div class="input-goup has-validation">
                  <select id="category" th:field="*{categoryId}" class="form-select"
                          th:classappend="${#fields.hasErrors('categoryId')} ? 'is-invalid' : 'is-valid'"
                           aria-describedby="validation-categoryid">
                      <option value="-1">---</option>
                      <option th:each="category : ${categories}"
                              th:value="${category.id}" th:text="${category.title}">
                        Category</option>
                  </select>
                  <div id="validation-categoryid" class="invalid-feedback" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}">
                  </div>
                </div>
              </div>
              <div class="col-12">
                <label class="form-label" for="task-tags">Tags</label>
                <input type="text" class="form-control" id="task-tags" th:field="*{tags}" placeholder="tas1, tag2, tag3,..."/>
              </div>

              <div class="col-12" style="...">
                <button type="submit" data-mdb-button-init data-mdb-ripple-init class="btn btn-primary">Create</button>
              </div>
            </form>


          <div class="container" style="..." th:if="${param.emptyListError != null}">
            <h1 class="text-center" sec:authorize="hasRole('ROLE_USER')">Create your first task...</h1>
            <img src="../static/img/empty-list.jpg" th:src="@{/img/empty-list.jpg}"
                 width="100%"/>
          </div>


          <table class="table mb-4" th:if="${param.emptyListError == null}">
            <thead>
            <tr>
              <th scope="col">Id.</th>
              <th scope="col">Title</th>
              <th scope="col">Description</th>
              <th scope="col">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="task : ${taskList}" th:classappend="${task.completed} ? 'table-success'">
              <th scope="row" th:text="${task.id}">1</th>
              <td th:text="${task.title}">Buy groceries for next week</td>
              <td th:text="${#strings.abbreviate(task.description, 50)}">Loren ipsum dolor sit amet</td>
              <td>
                  <a href="#" th:href="@{/task/{id}(id=${task.id})}" class="btn btn-primary">View</a>
                  <a class="btn btn-danger" th:onclick="|deleteTask(${task.id})|">Delete</a>
                  <form style="display:none" th:action="@{/task/{id}/del(id=${task.id})}" method="post" th:id="${'delete-task-'+task.id}"></form>
                  <a href="#" th:href="@{/task/{id}/toggle(id=${task.id})}" class="btn ms-1"
                     th:classappend="${task.completed} ? 'btn-ligt' : 'btn-dark'"
                     th:text="${task.completed} ? 'Disable' : 'Complete'">Complete</a>
              </td>
            </tr>
            </tbody>
          </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>
<footer class="footer mt-auto py-3 bg-light fixed-bottom">
    <div class="container">
        <input class="form-check-input" type="checkbox" value="" id="flexCheckCheckedDisabled" checked disabled>
    <span class="text-muted">TaskHive - DWES - Laura Aller de Silva</span>
  </div>
</footer>
<script>
    function deleteTask(id) {
      if (confirm('Are you sure to delete this Task?')) {
        document.getElementById('delete-task-'+id).submit();
      }
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
